# configs/config.yaml
# Aggregation weights — must sum to 1.0
weights:
  alpha: 0.3   # word-level (S_word)
  beta: 0.4    # sentence-level (S_sent)
  gamma: 0.3   # document-level (S_doc)

# Embedding models
models:
  word: "bert-base-uncased"           # Token embeddings (hidden states)
  sentence: "all-MiniLM-L6-v2"        # Sentence-Transformers model
  document: "all-mpnet-base-v2"       # Full-document embeddings

# Datasets to evaluate on
datasets:
  - name: halueval_qa
    split: test
    granularity: [word, sentence]
  - name: halueval_summarization
    split: test
    granularity: [sentence, document]
  - name: stsb
    split: validation
    granularity: [sentence]
  - name: snli
    split: test
    granularity: [sentence]

# Evaluation settings
evaluation:
  batch_size: 32
  max_token_length: 512
  output_dir: results/
  log_level: INFO
